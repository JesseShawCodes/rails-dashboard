services:
  db:
    image: postgres:15
    container_name: music_analytics_development
    restart: always
    environment:
      POSTGRES_USER: rails_realtime_user
      POSTGRES_PASSWORD: rails_realtime_pass
      POSTGRES_DB: music_analytics_development
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7

  web:
    build: .
    command: bundle exec rails s -b 0.0.0.0
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://rails_realtime_user:rails_realtime_pass@db:5432/music_analytics_development
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - db
      - redis

  sidekiq:
    build: .
    command: bundle exec sidekiq
    volumes:
      - .:/app:cached
    environment:
      - DATABASE_URL=postgresql://rails_realtime_user:rails_realtime_pass@db:5432/music_analytics_development
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - db
      - redis

volumes:
  pgdata: